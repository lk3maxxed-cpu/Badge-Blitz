# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e89d9fd3edfe7e45385c0628abd29287"
name = "badge-blitz-dev"
application_url = "https://badge-blitz-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_products,write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [
  "https://badge-blitz-production.up.railway.app/auth/callback",
  "https://badge-blitz-production.up.railway.app/auth/shopify/callback",
  "https://badge-blitz-production.up.railway.app/api/auth/callback"
]
